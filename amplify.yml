version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        - |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json found; falling back to npm install"
            npm install
          fi
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: ./
    files:
      - '.next/**/*'
      - 'public/**/*'
      - 'node_modules/**/*'
      - 'package.json'
      - 'package-lock.json'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
